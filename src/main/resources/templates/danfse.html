<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Nota Fiscal</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .content { margin-bottom: 20px; }
        .total { font-weight: bold; font-size: 1.2em; border-top: 1px solid #000; padding-top: 10px; }
    </style>
</head>
<body>
<div class="header">
    <h2>Nota Fiscal de Serviço Eletrônica (NFS-e)</h2>
    <p>Status: <span th:text="${invoice.status}"></span></p>
</div>

<div class="content">
    <h3>Prestador de Serviços</h3>
    <p>Razão Social: <span th:text="${invoice.company.corporateName}"></span></p>
    <p>CNPJ: <span th:text="${invoice.company.taxId}"></span></p>

    <h3>Tomador dos Serviços (Cliente)</h3>
    <p>Nome: <span th:text="${invoice.customer.name}"></span></p>
    <p>Documento: <span th:text="${invoice.customer.taxId}"></span></p>

    <h3>Serviço Prestado</h3>
    <p>Descrição: <span th:text="${invoice.serviceItem.description}"></span></p>
</div>

<div class="total">
    <p>Valor Total: R$ <span th:text="${invoice.totalValue}"></span></p>
</div>
</body>
</html>
